    input[type="password"], input[type="submit"] {

    }

    .progress-bar {
        width: 100%;
        height: 20px;
        background-color: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px auto;
    }

    .progress {
        height: 100%;
        width: 0%;
        background-color: #eaeaea;
        border-radius: 10px;
        animation: loading 10s ease-in-out infinite;
    }

    @keyframes loading {
        0% {
            width: 0%;
        }
        50% {
            width: 100%;
        }
        100% {
            width: 0%;
        }
    }


    @media (max-width: 600px) {
        .maintenance-message {
            padding: 15px;
