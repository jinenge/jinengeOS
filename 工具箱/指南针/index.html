<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=2.0, user-scalable=yes" />
    <title>指南针</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #090707;
            overflow: hidden;
        }

        /* 指南针外壳 */
        .compass-box {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            border: 12px solid #222;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #compass {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #arrow {
            width: 10px;
            height: 45%;
            background-color: red;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            transform: translate(-50%, -100%) rotate(0deg);
            box-shadow: 0 0 10px red;
            z-index: 10;
        }

        /* 中文方向：北 东 南 西 */
        .dir {
            position: absolute;
            font-size: 70px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 15px #000;
            z-index: 5;
        }

        .dir-n {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444; /* 北标红色更醒目 */
        }
        .dir-e {
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
        }
        .dir-s {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .dir-w {
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
        }

    </style>
</head>

<body>
    <div class="compass-box">
        <div id="compass">
            <div class="dir dir-n">北</div>
            <div class="dir dir-e">东</div>
            <div class="dir dir-s">南</div>
            <div class="dir dir-w">西</div>
            <div id="arrow"></div>
        </div>
    </div>

    <script>
        const arrow = document.getElementById('arrow');

        // 请求传感器权限
        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startCompass();
                        else alert('请允许方向传感器权限');
                    })
            } else {
                startCompass();
            }
        }

        function startCompass() {
            window.addEventListener('deviceorientation', e => {
                let alpha = e.alpha || 0;
                arrow.style.transform = `translate(-50%, -100%) rotate(${alpha}deg)`;
            });
        }

        requestPermission();
    </script>
</body>
</html>
