(function (window, document) {
    // 防止网页被嵌入
    if (top != self) {
        window.top.location.replace(self.location.href);
    }
    
    var get = function (id) {
        return document.getElementById(id);
    }
    
    var bind = function (element, event, callback) {
        return element.addEventListener(event, callback);
    }
    
    var auto = true; // 自动播放开关
    var player = get('player'); // 获取视频播放器
    var controls = get('controls'); // 获取控制按钮
    var hideTimeout; // 隐藏超时

    var randomm = function () {
        player.src = get('videoSelect').value + '?_t=' + Math.random(); // 更新视频源
        player.play(); // 播放视频
        // 更新下载链接
        get('download').href = get('videoSelect').value; // 更新下载按钮链接
    }

    bind(get('next1'), 'click', randomm);
    bind(player, 'error', function () {
        randomm(); // 如果播放出错，换一个视频
    });
    
    bind(get('switch'), 'click', function () {
        auto = !auto; // 切换自动播放状态
        this.innerText = '连续: ' + (auto ? '开' : '关'); // 更新按钮文本
    });
    
    bind(player, 'ended', function () {
        if (auto) randomm(); // 视频结束时自动播放
    });
    
    bind(get('videoSelect'), 'change', function () {
        player.src = this.value; // 更新视频源
        player.play(); // 播放新视频
        // 更新下载链接
        get('download').href = this.value; // 更新下载按钮链接
    });
    
    window.onload = function() {
        var lastSource = localStorage.getItem('lastVideoSource');
        if (lastSource) {
            get('videoSelect').value = lastSource; // 设置下拉框为上次选择的源
            player.src = lastSource; // 更新视频播放器源
        } else {
            player.src = get('videoSelect').value; // 默认选择第一个视频源
        }
        player.play(); // 自动播放
    };

    bind(get('videoSelect'), 'change', function () {
        localStorage.setItem('lastVideoSource', this.value); // 保存到 localStorage
    });

// 下载视频
downloadBtn.addEventListener('click', function () {
    const videoUrl = downloadBtn.getAttribute('data-url');
    if (videoUrl) {
        const link = document.createElement('a');
        link.href = videoUrl;
        link.download = videoUrl.split('/').pop().split('?')[0];
        link.click();
    } else {
        console.error('视频 URL 不存在');
    }
});
